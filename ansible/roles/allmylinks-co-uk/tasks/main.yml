- name: Create AML data volume
  file:
    path: "{{ aml_volume_data }}"
    owner: abarmin
    group: abarmin
    mode: "0755"
    recurse: yes

- name: Check if AML DB directory exists
  stat:
    path: "{{ aml_db_volume_data }}"
  register: aml_db_dir

- name: Create AML DB directory only if missing
  file:
    path: "{{ aml_db_volume_data }}"
    state: directory
    owner: abarmin
    group: abarmin
    mode: "0755"
  when: not aml_db_dir.stat.exists

- name: Create AML network
  containers.podman.podman_network:
    name: aml_net
    state: present

- name: Ensure AML PostgreSQL container is up and running
  containers.podman.podman_container:
    name: aml_db
    image: docker.io/postgres:17
    state: started
    restart_policy: always
    network: aml_net
    env:
      POSTGRES_DB: "{{ aml_db_name }}"
      POSTGRES_USER: "{{ aml_db_username }}"
      POSTGRES_PASSWORD: "{{ aml_db_password }}"
    ports:
      - "15432:5432"
    volumes:
      - "{{ aml_db_volume_data }}:/var/lib/postgresql/data"

- name: Ensure AML container is up and running
  containers.podman.podman_container:
    name: aml_service
    image: ghcr.io/aabarmin/allmylinks.co.uk:sha-fa626ba
    state: started
    restart_policy: always
    network: aml_net,cloudflared_net
    env:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://aml_db:5432/{{ aml_db_name }}"
      SPRING_DATASOURCE_USERNAME: "{{ aml_db_username }}"
      SPRING_DATASOURCE_PASSWORD: "{{ aml_db_password }}"
      BACKOFFICE_BOT_TOKEN: "{{ aml_service_backoffice_bot_token }}"
      BACKOFFICE_ADMIN_CHAT_ID: "{{ aml_service_backoffice_admin_chat_id }}"
      AUTH_GOOGLE_CLIENT_ID: "{{ aml_service_auth_google_client_id }}"
      AUTH_GOOGLE_CLIENT_SECRET: "{{ aml_service_auth_google_client_secret }}"
      SPRING_PROFILES_ACTIVE: "production"
    ports:
      - "58080:8080"
    volumes:
      - "{{ aml_volume_data }}:/app/storage"